<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>BurgerOrder Elite Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-dark bg-dark px-4">

<span class="navbar-brand">🍔 Burger Elite Pro</span>

<div>

<button class="btn btn-outline-light me-2" onclick="UI.toggleDark()">
🌙
</button>

<button class="btn btn-warning position-relative" onclick="UI.toggleCart()">

🛒

<span id="cartCount" class="badge bg-danger">0</span>

</button>

<button class="btn btn-danger ms-2" onclick="Auth.logout()">
Salir
</button>

</div>

</nav>


<!-- HERO -->

<section class="hero-banner">

<div class="hero-content">

<h1>🍔 Personaliza tu hamburguesa perfecta</h1>

<p>Elige ingredientes, agrega bebidas y crea tu combo ideal</p>

<button class="btn btn-warning btn-lg" onclick="UI.toggleCart()">

Ver carrito

</button>

</div>

</section>


<!-- PRODUCTOS -->

<div class="container my-5">

<div class="row" id="productContainer">

<!-- PRODUCTOS CARGADOS CON JS -->

</div>

</div>



<!-- CARRITO -->

<div id="cartPanel" class="cart d-none">

<div class="cart-header">

<h4>🛒 Tu Pedido</h4>

<button class="btn btn-danger btn-sm" onclick="UI.toggleCart()">
X
</button>

</div>


<div id="cartItems">

<p class="text-muted text-center">

Tu carrito está vacío

</p>

</div>


<input id="promoInput" class="form-control my-2" placeholder="Código promoción">


<button class="btn btn-dark w-100 mb-2" onclick="Promotions.apply()">

Aplicar Promoción

</button>


<h5 class="mt-3">

Total: $<span id="cartTotal">0</span>

</h5>


<button class="btn btn-success w-100 mt-2" onclick="PDF.generate()">

Generar Factura

</button>

</div>



<!-- OVERLAY DEL CARRITO -->

<div id="cartOverlay" class="d-none" onclick="UI.toggleCart()"></div>



<!-- MODAL PERSONALIZAR HAMBURGUESA -->

<div class="modal fade" id="customModal">

<div class="modal-dialog">

<div class="modal-content">

<div class="modal-header">

<h5 class="modal-title">

🍔 Personaliza tu hamburguesa

</h5>

<button class="btn-close" data-bs-dismiss="modal"></button>

</div>


<div class="modal-body">


<input type="hidden" id="selectedBurgerId">


<h6>Ingredientes</h6>


<div id="ingredientsList">

<label>

<input type="checkbox" value="Queso" checked>
Queso

</label>
<br>

<label>

<input type="checkbox" value="Cebolla" checked>
Cebolla

</label>
<br>

<label>

<input type="checkbox" value="Lechuga" checked>
Lechuga

</label>
<br>

<label>

<input type="checkbox" value="Tocineta">
Tocineta (+2000)

</label>
<br>

<label>

<input type="checkbox" value="Salsa especial">
Salsa especial

</label>

</div>


<hr>


<h6>Bebida</h6>


<select id="drink" class="form-select">

<option value="">Sin bebida</option>

<option value="Coca Cola">Coca Cola (+4000)</option>

<option value="Pepsi">Pepsi (+3500)</option>

<option value="Jugo Natural">Jugo Natural (+5000)</option>

</select>

</div>


<div class="modal-footer">

<button class="btn btn-secondary" data-bs-dismiss="modal">

Cancelar

</button>


<button class="btn btn-success" onclick="UI.addCustomBurger()">

Agregar al carrito

</button>

</div>

</div>

</div>

</div>



<!-- LIBRERIAS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


<!-- LIBRERIA PDF -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>



<!-- SCRIPTS DEL SISTEMA -->

<script src="js/config.js"></script>

<script src="js/storage.js"></script>

<script src="js/products.js"></script>

<script src="js/cart.js"></script>

<script src="js/promotions.js"></script>

<script src="js/ui.js"></script>

<script src="js/pdf.js"></script>

<script src="js/auth.js"></script>



</body>

</html>
